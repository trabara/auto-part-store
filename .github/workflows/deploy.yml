name: Deploy to Railway

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Railway project name"
        required: true
        type: string
      medusa_image:
        description: "Medusa Docker image (e.g., ghcr.io/user/repo/medusa:latest)"
        required: true
        type: string
        default: "ghcr.io/trabara/auto-part-store/medusa:latest"
      storefront_image:
        description: "Storefront Docker image (e.g., ghcr.io/user/repo/storefront:latest)"
        required: true
        type: string
        default: "ghcr.io/trabara/auto-part-store/storefront:latest"
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  TERRAFORM_VERSION: 1.7.0

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: true

      - name: Generate Secrets
        id: secrets
        run: |
          JWT_SECRET=$(openssl rand -hex 32)
          COOKIE_SECRET=$(openssl rand -hex 32)
          REVALIDATE_SECRET=$(openssl rand -hex 32)
          MINIO_ACCESS_KEY="minio$(openssl rand -hex 8)"
          MINIO_SECRET_KEY=$(openssl rand -hex 32)

          echo "JWT_SECRET=$JWT_SECRET" >> $GITHUB_OUTPUT
          echo "COOKIE_SECRET=$COOKIE_SECRET" >> $GITHUB_OUTPUT
          echo "REVALIDATE_SECRET=$REVALIDATE_SECRET" >> $GITHUB_OUTPUT
          echo "MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "MINIO_SECRET_KEY=$MINIO_SECRET_KEY" >> $GITHUB_OUTPUT
          echo "REGISTRY_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          echo "REGISTRY_USERNAME=${{ github.actor }}" >> $GITHUB_OUTPUT

          echo "::add-mask::$JWT_SECRET"
          echo "::add-mask::$COOKIE_SECRET"
          echo "::add-mask::$REVALIDATE_SECRET"
          echo "::add-mask::$MINIO_ACCESS_KEY"
          echo "::add-mask::$MINIO_SECRET_KEY"

      - name: Terraform Init
        id: init
        working-directory: iac/railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          terraform init -upgrade=true

      - name: Terraform Format Check
        working-directory: iac/railway
        run: |
          terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        working-directory: iac/railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          TF_VAR_project_name: ${{ github.event.inputs.project_name }}
          TF_VAR_medusa_image_source: ${{ github.event.inputs.medusa_image }}
          TF_VAR_storefront_image_source: ${{ github.event.inputs.storefront_image }}
          TF_VAR_jwt_secret: ${{ steps.secrets.outputs.JWT_SECRET }}
          TF_VAR_cookie_secret: ${{ steps.secrets.outputs.COOKIE_SECRET }}
          TF_VAR_revalidate_secret: ${{ steps.secrets.outputs.REVALIDATE_SECRET }}
          TF_VAR_minio_access_key: ${{ steps.secrets.outputs.MINIO_ACCESS_KEY }}
          TF_VAR_minio_secret_key: ${{ steps.secrets.outputs.MINIO_SECRET_KEY }}
          TF_VAR_minio_bucket: medusa-store
          TF_VAR_registry_username: ${{ steps.secrets.outputs.REGISTRY_USERNAME }}
          TF_VAR_registry_token: ${{ steps.secrets.outputs.REGISTRY_TOKEN }}
        run: |
          terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        working-directory: iac/railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          TF_VAR_project_name: ${{ github.event.inputs.project_name }}
          TF_VAR_medusa_image_source: ${{ github.event.inputs.medusa_image }}
          TF_VAR_storefront_image_source: ${{ github.event.inputs.storefront_image }}
          TF_VAR_jwt_secret: ${{ steps.secrets.outputs.JWT_SECRET }}
          TF_VAR_cookie_secret: ${{ steps.secrets.outputs.COOKIE_SECRET }}
          TF_VAR_revalidate_secret: ${{ steps.secrets.outputs.REVALIDATE_SECRET }}
          TF_VAR_minio_access_key: ${{ steps.secrets.outputs.MINIO_ACCESS_KEY }}
          TF_VAR_minio_secret_key: ${{ steps.secrets.outputs.MINIO_SECRET_KEY }}
          TF_VAR_minio_bucket: medusa-store
          TF_VAR_registry_username: ${{ steps.secrets.outputs.REGISTRY_USERNAME }}
          TF_VAR_registry_token: ${{ steps.secrets.outputs.REGISTRY_TOKEN }}
        run: |
          terraform apply -auto-approve -no-color

      - name: Extract Outputs
        id: outputs
        working-directory: iac/railway
        run: |
          echo "medusa_url=$(terraform output -raw medusa_url)" >> $GITHUB_OUTPUT
          echo "storefront_url=$(terraform output -raw storefront_url)" >> $GITHUB_OUTPUT
          echo "minio_api_url=$(terraform output -raw minio_api_url)" >> $GITHUB_OUTPUT
          echo "minio_console_url=$(terraform output -raw minio_console_url)" >> $GITHUB_OUTPUT

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Storefront | ${{ steps.outputs.outputs.storefront_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Medusa API | ${{ steps.outputs.outputs.medusa_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MinIO API | ${{ steps.outputs.outputs.minio_api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MinIO Console | ${{ steps.outputs.outputs.minio_console_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Credentials (save these!)" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| JWT_SECRET | \`${{ steps.secrets.outputs.JWT_SECRET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| COOKIE_SECRET | \`${{ steps.secrets.outputs.COOKIE_SECRET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| REVALIDATE_SECRET | \`${{ steps.secrets.outputs.REVALIDATE_SECRET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MINIO_ACCESS_KEY | \`${{ steps.secrets.outputs.MINIO_ACCESS_KEY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| MINIO_SECRET_KEY | \`${{ steps.secrets.outputs.MINIO_SECRET_KEY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Important**: Save these credentials! They are only shown once and will be lost on next deployment." >> $GITHUB_STEP_SUMMARY
