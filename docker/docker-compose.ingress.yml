services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.transport.respondingTimeouts.readTimeout=0"
      - "--entrypoints.web.transport.respondingTimeouts.writeTimeout=0"
      - "--entrypoints.web.transport.respondingTimeouts.idleTimeout=180s"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/certificates
    networks:
      - medusa_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"

  medusa:
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.medusa-backend.loadbalancer.server.port=9000"
      - "traefik.http.routers.medusa-backend.rule=Host(`api.localhost`)"
      - "traefik.http.routers.medusa-backend.entrypoints=web"
      - "traefik.http.routers.medusa-backend.service=medusa-backend"
      - "traefik.http.middlewares.medusa-backend-headers.headers.customrequestheaders.X-Forwarded-Proto=http"
      - "traefik.http.routers.medusa-backend.middlewares=medusa-backend-headers"

  storefront:
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.storefront.loadbalancer.server.port=8000"
      - "traefik.http.routers.storefront.rule=Host(`shop.localhost`) || Host(`localhost`)"
      - "traefik.http.routers.storefront.entrypoints=web"
      - "traefik.http.routers.storefront.service=storefront"
      - "traefik.http.routers.storefront.priority=1"
      - "traefik.http.middlewares.storefront-headers.headers.customrequestheaders.X-Forwarded-Proto=http"
      - "traefik.http.routers.storefront.middlewares=storefront-headers"

volumes:
  traefik-certificates:
