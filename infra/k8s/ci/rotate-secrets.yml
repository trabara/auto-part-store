name: Rotate Secrets

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant name"
        required: true
        type: choice
        options:
          - acme
          - globex

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Generate new secrets
        run: |
          ./infra/k8s/scripts/generate-secrets.sh infra/k8s/tenants/${{ inputs.tenant }}/secrets/secrets.env

      - name: Deploy with new secrets
        run: |
          ./infra/k8s/scripts/deploy-tenant.sh ${{ inputs.tenant }}

      - name: Commit new secrets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(k8s): rotate secrets for ${{ inputs.tenant }}"
          file_pattern: "infra/k8s/tenants/${{ inputs.tenant }}/secrets/secrets.env"
          skip_dirty: false
