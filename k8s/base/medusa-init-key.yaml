apiVersion: batch/v1
kind: Job
metadata:
  name: medusa-init-key
  namespace: smap-store
  labels:
    app: medusa
    tier: backend
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: medusa-sa
      containers:
        - name: medusa
          image: localhost:5000/smap-store-medusa:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e

              echo "=== Medusa Init Key Starting ==="

              # Wait for medusa-init to complete using Node.js
              node << 'NODEEOF'
              const https = require('https');
              const fs = require('fs');
              const { execSync } = require('child_process');

              const token = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();
              const ca = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt');
              const namespace = 'smap-store';

              function k8sRequest(path) {
                return new Promise((resolve, reject) => {
                  const options = {
                    hostname: 'kubernetes.default.svc',
                    path: path,
                    method: 'GET',
                    headers: {
                      'Authorization': `Bearer ${token}`,
                      'Content-Type': 'application/json'
                    },
                    ca: ca
                  };

                  const req = https.request(options, (res) => {
                    let data = '';
                    res.on('data', chunk => data += chunk);
                    res.on('end', () => resolve(JSON.parse(data)));
                  });
                  req.on('error', reject);
                  req.end();
                });
              }

              async function waitForJob(jobName) {
                console.log(`Waiting for job '${jobName}' to complete...`);
                const maxAttempts = 60;
                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                  try {
                    const job = await k8sRequest(`/apis/batch/v1/namespaces/${namespace}/jobs/${jobName}`);
                    const isComplete = job.status?.conditions?.some(c => c.type === 'Complete' && c.status === 'True');
                    if (isComplete) {
                      console.log(`Job '${jobName}' completed`);
                      return true;
                    }
                  } catch (e) {
                    // Job might not exist yet
                  }
                  console.log(`  Attempt ${attempt}/${maxAttempts} - job not complete, waiting 5s...`);
                  await new Promise(r => setTimeout(r, 5000));
                }
                throw new Error(`Job '${jobName}' failed to complete`);
              }

              async function main() {
                await waitForJob('medusa-init');
                console.log('All dependencies ready, proceeding...');
              }

              main().catch(e => {
                console.error('Error:', e.message);
                process.exit(1);
              });
              NODEEOF

              # Small delay to ensure database is ready
              echo "Waiting for database to be ready..."
              sleep 10

              # Wait for postgres
              echo "Waiting for postgres..."
              MAX_ATTEMPTS=30
              ATTEMPT=1
              while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
                if nc -z postgres.smap-store 5432 2>/dev/null; then
                  echo "postgres is ready"
                  break
                fi
                echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS - postgres not ready, waiting 2s..."
                sleep 2
                ATTEMPT=$((ATTEMPT + 1))
              done

              # Get publishable key using medusa exec
              echo "Extracting publishable key via medusa exec..."
              cd /app/.medusa/server
              OUTPUT=$(yarn medusa exec ./src/scripts/init.js 2>/dev/null)
              KEY=$(echo "$OUTPUT" | sed -n 's/.*__KEY__\(.*\)__KEY__.*/\1/p' | head -1)

              if [ -z "$KEY" ]; then
                echo "ERROR: No publishable key found in api_key table"
                echo "Make sure medusa-init job completed successfully"
                echo "Debug output: [$OUTPUT]"
                exit 1
              fi

              echo "Found key: $KEY"

              # Create secret using Node.js
              export API_KEY="$KEY"
              node << 'NODEEOF2'
              const https = require('https');
              const fs = require('fs');

              const token = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();
              const ca = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt');
              const namespace = 'smap-store';
              const key = process.env.API_KEY;

              console.log('Key from env:', key ? 'received' : 'undefined');

              const secret = JSON.stringify({
                apiVersion: 'v1',
                kind: 'Secret',
                metadata: {
                  name: 'storefront-key',
                  namespace: namespace
                },
                type: 'Opaque',
                data: {
                  NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: Buffer.from(key).toString('base64')
                }
              });

              // Delete existing secret
              const deleteReq = https.request({
                hostname: 'kubernetes.default.svc',
                path: `/api/v1/namespaces/${namespace}/secrets/storefront-key`,
                method: 'DELETE',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                ca: ca
              }, (res) => {
                console.log('Delete response status:', res.statusCode);
              });

              deleteReq.on('error', (e) => {
                // Ignore errors (secret might not exist)
              });

              deleteReq.end();

              // Create secret
              const createReq = https.request({
                hostname: 'kubernetes.default.svc',
                path: `/api/v1/namespaces/${namespace}/secrets`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                ca: ca
              }, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log('Create response status:', res.statusCode);
                  console.log('Response:', data);
                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    console.log('Secret created successfully!');
                    console.log('=== Done ===');
                  } else {
                    console.error('Failed to create secret');
                    process.exit(1);
                  }
                });
              });

              createReq.on('error', (e) => {
                console.error('Error:', e.message);
                process.exit(1);
              });

              createReq.write(secret);
              createReq.end();
              NODEEOF2

          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          env:
            - name: KUBECONFIG
              value: /tmp/kubeconfig
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
