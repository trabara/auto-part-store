apiVersion: batch/v1
kind: Job
metadata:
  name: medusa-init
  namespace: smap-store
  labels:
    app: medusa
    tier: backend
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: medusa-init
          image: localhost:5000/smap-store-medusa:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e

              echo "=== Medusa Init Starting ==="

              wait_for_service() {
                local host=$1
                local port=$2
                local name=$3
                echo "Waiting for $name ($host:$port)..."
                local max_attempts=30
                local attempt=1
                while [ $attempt -le $max_attempts ]; do
                  if wget -q --timeout=2 -O /dev/null "http://$host:$port" 2>/dev/null || \
                     (echo "" | nc -w2 "$host" "$port" 2>/dev/null); then
                    echo "$name is ready"
                    return 0
                  fi
                  echo "  Attempt $attempt/$max_attempts - $name not ready, waiting 2s..."
                  sleep 2
                  attempt=$((attempt + 1))
                done
                echo "ERROR: $name failed to become ready after ${max_attempts} attempts"
                return 1
              }

              # Wait for postgres
              wait_for_service "postgres.smap-store" "5432" "postgres"

              # Wait for redis  
              wait_for_service "redis.smap-store" "6379" "redis"

              # Wait for medusa (optional - allows migrations to work)
              echo "Waiting for medusa database to accept connections..."
              sleep 5

              # Run migrations (idempotent)
              echo "Running migrations..."
              cd /app/.medusa/server && yarn medusa db:migrate || echo "Migrations already applied"

              # Run seed (idempotent - may fail if already seeded)
              echo "Running seed..."
              cd /app/.medusa/server && yarn medusa exec ./src/scripts/seed.js || echo "Seed already applied or skipped"

              # Create admin user
              echo "Creating admin user..."
              cd /app/.medusa/server && yarn medusa user -e "$MEDUSA_ADMIN_EMAIL" -p "$MEDUSA_ADMIN_PASSWORD" || echo "Admin user created or already exists"

              echo "=== Medusa Init Complete ==="
          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          env:
            - name: MEDUSA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: medusa-secret
                  key: MEDUSA_ADMIN_EMAIL
            - name: MEDUSA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medusa-secret
                  key: MEDUSA_ADMIN_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
