apiVersion: batch/v1
kind: Job
metadata:
  name: medusa-init
  namespace: smap-store
  labels:
    app: medusa
    tier: backend
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: medusa-init
          image: localhost:5000/smap-store-medusa:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e

              echo "=== Medusa Init Starting ==="

              # Wait for postgres
              echo "Waiting for postgres..."
              until nc -z postgres.smap-store 5432; do
                echo "postgres not ready, waiting..."
                sleep 2
              done
              echo "postgres is ready"

              # Wait for redis
              echo "Waiting for redis..."
              until nc -z redis.smap-store 6379; do
                echo "redis not ready, waiting..."
                sleep 2
              done
              echo "redis is ready"

              # Run migrations (idempotent)
              echo "Running migrations..."
              cd /app/.medusa/server && yarn medusa db:migrate || echo "Migrations already applied"

              # Run seed (idempotent - may fail if already seeded)
              echo "Running seed..."
              cd /app/.medusa/server && yarn medusa exec ./src/scripts/seed.js || echo "Seed already applied or skipped"

              # Create admin user
              echo "Creating admin user..."
              cd /app/.medusa/server && yarn medusa user -e "$MEDUSA_ADMIN_EMAIL" -p "$MEDUSA_ADMIN_PASSWORD" || echo "Admin user created or already exists"

              echo "=== Medusa Init Complete ==="
          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          env:
            - name: MEDUSA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: medusa-secret
                  key: MEDUSA_ADMIN_EMAIL
            - name: MEDUSA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medusa-secret
                  key: MEDUSA_ADMIN_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
