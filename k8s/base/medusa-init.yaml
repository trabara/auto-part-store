apiVersion: batch/v1
kind: Job
metadata:
  name: medusa-init
  namespace: smap-store
  labels:
    app: medusa
    tier: backend
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: medusa-init
          image: localhost:5000/smap-store-medusa:latest
          command: ["sh", "-c"]
          args:
            - |
              set -e

              echo "=== Medusa Init Starting ==="

              # Wait for postgres
              echo "Waiting for postgres..."
              until nc -z postgres.smap-store 5432; do
                echo "postgres not ready, waiting..."
                sleep 2
              done
              echo "postgres is ready"

              # Wait for redis
              echo "Waiting for redis..."
              until nc -z redis.smap-store 6379; do
                echo "redis not ready, waiting..."
                sleep 2
              done
              echo "redis is ready"

              # Run migrations (idempotent)
              echo "Running migrations..."
              cd /app/.medusa/server && yarn medusa db:migrate || echo "Migrations already applied"

              # Run seed (idempotent - may fail if already seeded)
              echo "Running seed..."
              cd /app/.medusa/server && yarn medusa exec ./src/scripts/seed.js || echo "Seed already applied or skipped"

              # Add Tunisia to region (idempotent)
              echo "Ensuring Tunisia is assigned to region..."
              PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB -c "
                INSERT INTO region_country (region_id, country_id)
                SELECT r.id, c.id FROM region r, country c WHERE r.name = 'Europe' AND c.iso_2 = 'tn'
                ON CONFLICT DO NOTHING;
              " 2>/dev/null || echo "Tunisia may already be assigned"

              # Extract publishable key (for logging)
              echo "Extracting publishable API key..."
              OUTPUT=$(cd /app/.medusa/server && yarn medusa exec ./src/scripts/init.js 2>/dev/null)
              KEY=$(echo "$OUTPUT" | sed -n 's/.*__KEY__\(.*\)__KEY__.*/\1/p' | head -1)

              if [ -n "$KEY" ]; then
                echo "Found key: $KEY"
                echo "Note: Use medusa-init-key job to create the secret"
                echo ""
                echo "=== Medusa Init Complete ==="
              else
                echo "ERROR: No publishable key found"
                echo "Output was: $OUTPUT"
                exit 1
              fi
          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
