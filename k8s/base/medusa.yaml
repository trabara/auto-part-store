apiVersion: v1
kind: ServiceAccount
metadata:
  name: medusa-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: medusa-init-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "secrets"]
    verbs: ["get", "list", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: medusa-init-rolebinding
subjects:
  - kind: ServiceAccount
    name: medusa-sa
roleRef:
  kind: Role
  name: medusa-init-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: medusa-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://medusa:CHANGE_ME@postgres:5432/medusa-v2?sslmode=disable"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379"
  JWT_SECRET: "CHANGE_ME"
  COOKIE_SECRET: "CHANGE_ME"
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
  MINIO_BUCKET: "medusa"
  MEDUSA_ADMIN_EMAIL: "admin@smap-store.local"
  MEDUSA_ADMIN_PASSWORD: "supersecret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medusa
  labels:
    app: medusa
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medusa
  template:
    metadata:
      labels:
        app: medusa
        tier: backend
    spec:
      serviceAccountName: medusa-sa
      initContainers:
        - name: wait-for-dependencies
          image: medusa
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for dependencies..."

              # Wait for postgres
              echo "Checking postgres..."
              until nc -z postgres 5432; do
                echo "postgres not ready, waiting..."
                sleep 2
              done
              echo "postgres is ready"

              # Wait for redis
              echo "Checking redis..."
              until nc -z redis 6379; do
                echo "redis not ready, waiting..."
                sleep 2
              done
              echo "redis is ready"

              echo "All dependencies ready"
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: medusa
          image: medusa
          command: ["sh", "-c"]
          args:
            - |
              echo "Starting Medusa server..."
              cd /app/.medusa/server && yarn medusa start
          ports:
            - containerPort: 9000
              name: http
          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: medusa
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: medusa
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  selector:
    app: medusa
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medusa-config
data:
  NODE_ENV: "production"
  STORE_CORS: "http://SHOP_DOMAIN"
  ADMIN_CORS: "http://ADMIN_DOMAIN"
  AUTH_CORS: "http://SHOP_DOMAIN"
  ADMIN_EMAIL: "admin@smap-store.local"
  ADMIN_URL: "http://ADMIN_DOMAIN"
  MINIO_ENDPOINT: "MINIO_DOMAIN:9000"
  MINIO_USE_SSL: "false"
  MINIO_REGION: "us-east-1"
