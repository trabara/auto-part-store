apiVersion: v1
kind: ServiceAccount
metadata:
  name: medusa-sa
  namespace: smap-store
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: medusa-init-role
  namespace: smap-store
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "secrets"]
    verbs: ["get", "list", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: medusa-init-rolebinding
  namespace: smap-store
subjects:
  - kind: ServiceAccount
    name: medusa-sa
    namespace: smap-store
roleRef:
  kind: Role
  name: medusa-init-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: medusa-secret
  namespace: smap-store
type: Opaque
stringData:
  DATABASE_URL: "postgresql://medusa:CHANGE_ME_postgres_password@postgres.smap-store:5432/medusa-v2?sslmode=disable"
  REDIS_URL: "redis://:CHANGE_ME_redis_password@redis.smap-store:6379"
  JWT_SECRET: "CHANGE_ME_jwt_secret_32chars_min"
  COOKIE_SECRET: "CHANGE_ME_cookie_secret_32chars"
  MINIO_ACCESS_KEY: "CHANGE_ME_minio_user"
  MINIO_SECRET_KEY: "CHANGE_ME_minio_password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medusa
  namespace: smap-store
  labels:
    app: medusa
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medusa
  template:
    metadata:
      labels:
        app: medusa
        tier: backend
    spec:
      serviceAccountName: medusa-sa
      containers:
        - name: medusa
          image: localhost:5000/smap-store-medusa:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Starting Medusa server..."
              cd /app/.medusa/server && yarn medusa start
          ports:
            - containerPort: 9000
              name: http
          envFrom:
            - secretRef:
                name: medusa-secret
            - configMapRef:
                name: medusa-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: medusa
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: medusa
  namespace: smap-store
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  selector:
    app: medusa
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: medusa-config
  namespace: smap-store
data:
  NODE_ENV: "production"
  STORE_CORS: "http://shop.localhost"
  ADMIN_CORS: "http://admin.localhost"
  AUTH_CORS: "http://shop.localhost"
  MINIO_ENDPOINT: "minio.localhost:9000"
  MINIO_USE_SSL: "false"
  MINIO_REGION: "us-east-1"
