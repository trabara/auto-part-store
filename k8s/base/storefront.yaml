apiVersion: v1
kind: ServiceAccount
metadata:
  name: storefront-sa
  namespace: smap-store
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: storefront-secret-reader
  namespace: smap-store
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: storefront-secret-reader-binding
  namespace: smap-store
subjects:
  - kind: ServiceAccount
    name: storefront-sa
    namespace: smap-store
roleRef:
  kind: Role
  name: storefront-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: storefront-secret
  namespace: smap-store
type: Opaque
stringData:
  REVALIDATE_SECRET: "CHANGE_ME_revalidate_secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: smap-store
  labels:
    app: storefront
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storefront
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: storefront
        tier: frontend
    spec:
      serviceAccountName: storefront-sa
      hostAliases:
        - ip: "10.43.173.17"
          hostnames:
            - api.localhost
            - shop.localhost
            - minio.localhost
            - minio-console.localhost
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      initContainers:
        - name: wait-for-medusa
          image: localhost:5000/smap-store-storefront:latest
          command: ["node", "-e"]
          args:
            - |
              const https = require('https');
              const fs = require('fs');
              const http = require('http');

              const token = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();
              const ca = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt');
              const namespace = 'smap-store';

              function httpGet(url, headers = {}) {
                return new Promise((resolve, reject) => {
                  const lib = url.startsWith('https') ? https : http;
                  const opts = {
                    hostname: url.replace(/^https?:\/\//, '').split('/')[0],
                    path: '/' + url.split('/').slice(3).join('/'),
                    method: 'GET',
                    headers: { ...headers },
                    ca: url.startsWith('https') ? ca : undefined
                  };
                  const req = lib.request(opts, (res) => {
                    let data = '';
                    res.on('data', chunk => data += chunk);
                    res.on('end', () => resolve({ status: res.statusCode, data }));
                  });
                  req.on('error', reject);
                  req.end();
                });
              }

              async function waitForDependencies() {
                console.log('Waiting for medusa to be ready (migrations complete)...');
                const maxAttempts = 60;
                
                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                  try {
                    const healthRes = await httpGet('http://api.localhost/health');
                    
                    if (healthRes.status === 200) {
                      console.log('Medusa is ready');
                      process.exit(0);
                    }
                  } catch (e) {
                    // Ignore errors and retry
                  }
                  
                  console.log(`  Attempt ${attempt}/${maxAttempts} - medusa not ready, waiting 5s...`);
                  await new Promise(r => setTimeout(r, 5000));
                }
                
                console.log('WARNING: Timeout waiting for medusa');
                process.exit(1);
              }

              waitForDependencies();
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: storefront
          image: localhost:5000/smap-store-storefront:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: storefront-secret
            - configMapRef:
                name: storefront-config
            - secretRef:
                name: storefront-key
                optional: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cache
              mountPath: /app/.next/cache
            - name: storefront-cache
              mountPath: /app/apps/storefront/.next/cache
      volumes:
        - name: cache
          emptyDir: {}
        - name: storefront-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: storefront
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: smap-store
spec:
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: storefront
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storefront-config
  namespace: smap-store
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_BASE_URL: "http://shop.localhost"
  NEXT_PUBLIC_MEDUSA_BACKEND_URL: "http://api.localhost"
