apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smap-store-development

resources:
  - ../../base/namespace.yaml
  - ../../base/postgres.yaml
  - ../../base/redis.yaml
  - ../../base/minio.yaml
  - ../../base/minio-init.yaml
  - ../../base/medusa.yaml
  - ../../base/medusa-init.yaml
  - ../../base/storefront.yaml
  - ../../base/ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: smap-store
    includeSelectors: true

images:
  - name: medusa
    newName: localhost:5000/smap-store-medusa
    newTag: latest
  - name: storefront
    newName: localhost:5000/smap-store-storefront
    newTag: latest

patches:
  - path: patches/replicas.yaml
    target:
      kind: Deployment
      name: medusa
  - path: patches/replicas.yaml
    target:
      kind: Deployment
      name: storefront
