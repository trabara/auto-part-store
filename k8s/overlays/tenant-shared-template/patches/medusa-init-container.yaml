$patch: replace
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medusa
  spec:
    template:
      spec:
        initContainers:
          - name: wait-for-dependencies
            image: medusa
            command: ["sh", "-c"]
            args:
              - |
                echo "Waiting for dependencies (shared Docker services)..."

                # PostgreSQL host from DATABASE_URL
                DB_URL="${DATABASE_URL}"
                PG_HOST=$(echo "$DB_URL" | sed -n 's|.*@\([^:]*\):\([0-9]*\)/.*|\1|p')

                # Redis host from REDIS_URL
                REDIS_URL_STR="${REDIS_URL}"
                REDIS_HOST=$(echo "$REDIS_URL_STR" | sed -n 's|redis://:[^@]*@\([^:]*\):\([0-9]*\)|\1|p')

                echo "Waiting for PostgreSQL at $PG_HOST:5432..."
                until nc -z "$PG_HOST" 5432; do
                  echo "PostgreSQL not ready, waiting..."
                  sleep 2
                done
                echo "PostgreSQL is ready"

                echo "Waiting for Redis at $REDIS_HOST:6379..."
                until nc -z "$REDIS_HOST" 6379; do
                  echo "Redis not ready, waiting..."
                  sleep 2
                done
                echo "Redis is ready"

                echo "All dependencies ready"
            envFrom:
              - secretRef:
                  name: medusa-secret
              - configMapRef:
                  name: medusa-config
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
