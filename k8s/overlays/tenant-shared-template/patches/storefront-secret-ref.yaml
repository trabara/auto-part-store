apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  spec:
    template:
      spec:
        initContainers:
          - name: wait-for-medusa
            image: storefront
            command: ["node", "-e"]
            args:
              - |
                const https = require('https');
                const http = require('http');
                const fs = require('fs');

                const token = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/token', 'utf8').trim();
                const ca = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/ca.crt');
                const namespace = fs.readFileSync('/var/run/secrets/kubernetes.io/serviceaccount/namespace', 'utf8').trim();

                function httpGet(url, headers = {}) {
                  return new Promise((resolve, reject) => {
                    const lib = url.startsWith('https') ? https : http;
                    const opts = {
                      hostname: url.replace(/^https?:\/\/, '').split('/')[0],
                      path: '/' + url.split('/').slice(3).join('/'),
                      method: 'GET',
                      headers: { ...headers },
                      ca: url.startsWith('https') ? ca : undefined
                    };
                    const req = lib.request(opts, (res) => {
                      let data = '';
                      res.on('data', chunk => data += chunk);
                      res.on('end', () => resolve({ status: res.statusCode, data }));
                    });
                    req.on('error', reject);
                    req.end();
                  });
                }

                async function waitForDependencies() {
                  console.log('Waiting for storefront-key secret with valid publishable key...');
                  const maxAttempts = 60;
                  
                  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    try {
                      const secretRes = await httpGet(
                        `https://kubernetes.default.svc/api/v1/namespaces/${namespace}/secrets/storefront-key`,
                        { 'Authorization': `Bearer ${token}` }
                      );
                      
                      if (secretRes.status === 200 && secretRes.data) {
                        const match = secretRes.data.match(/"NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY":"([^"]+)"/);
                        if (match) {
                          const decoded = Buffer.from(match[1], 'base64').toString();
                          if (/^pk_[a-f0-9]{32,}$/.test(decoded)) {
                            console.log(`Valid storefront-key found: ${decoded.substring(0, 20)}...`);
                            process.exit(0);
                          }
                        }
                      }
                    } catch (e) {}
                    
                    console.log(`  Attempt ${attempt}/${maxAttempts} - waiting 5s...`);
                    await new Promise(r => setTimeout(r, 5000));
                  }
                  
                  console.log('WARNING: Timeout waiting for valid storefront-key');
                  process.exit(1);
                }

                waitForDependencies();
            resources:
              requests:
                cpu: "10m"
                memory: "32Mi"
              limits:
                cpu: "100m"
                memory: "64Mi"
            containers:
              - name: storefront
                envFrom:
                  - secretRef:
                      name: storefront-secret
                  - configMapRef:
                      name: storefront-config
                  - secretRef:
                      name: storefront-key
                      optional: true
